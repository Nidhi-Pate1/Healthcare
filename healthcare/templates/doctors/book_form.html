<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Booking | CuraFlow</title>
    
    <!-- Google Fonts & Smooth Animation Engine Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            /* Cozy & Soft Healthcare Color Variables */
            --bg-calm: #f4f7f5;
            --text-dark: #12241f;
            --text-muted: #4e635c;
            
            /* Main Hues */
            --sage-primary: #1f4e39;
            --sage-light: #3e926d;
            --sage-accent: #7ed9ae;
            
            /* Cozy Earth Accents */
            --earth-warm: #d9774a;
            --earth-light: #fdf3ee;
            --cream-soft: #ffffff;
            --sand-warm: #faf9f6;
            
            /* Modern Structural Properties */
            --radius-large: 28px;
            --radius-medium: 18px;
            --radius-pill: 60px;
            --card-shadow: 0 20px 40px rgba(31, 78, 57, 0.04);
            --hover-shadow: 0 35px 65px rgba(31, 78, 57, 0.09);
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #eaf2ee 0%, var(--bg-calm) 50%);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* DIGITAL HEALTH PORTAL WRAPPER WITH DIAGONAL SLICE REVEAL */
        .booking-container {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-large);
            padding: 45px;
            width: 100%;
            max-width: 520px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: relative;
            box-sizing: border-box;
            
            /* High-end Diagonal Slice Reveal Entrance Animation matching the Home page */
            animation: diagonalSliceReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: clip-path;
        }

        @keyframes diagonalSliceReveal {
            0% { clip-path: polygon(0 0, 0 0, 0 100%, 0% 100%); opacity: 0.3; }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); opacity: 1; }
        }

        h2 {
            text-align: center;
            font-size: 28px;
            margin: 0 0 35px 0;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1px;
            line-height: 1.2;
        }

        h2 span {
            color: var(--sage-light);
            background: linear-gradient(to right, var(--sage-primary), var(--earth-warm));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 22px;
            display: block;
            margin-top: 6px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-weight: 700;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            background: var(--sand-warm);
            border: 1px solid rgba(31, 78, 57, 0.08);
            border-radius: var(--radius-medium);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            box-sizing: border-box;
            transition: var(--transition-smooth);
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            background: var(--cream-soft);
            border-color: var(--sage-light);
            box-shadow: 0 0 0 4px rgba(62, 146, 109, 0.1);
        }

        textarea {
            height: 110px;
            resize: none;
            line-height: 1.5;
        }

        /* Cozy Earth Accent Action Button */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: var(--radius-medium);
            background: var(--sage-primary);
            color: white;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 25px rgba(31, 78, 57, 0.15);
        }

        button:hover {
            transform: translateY(-3px);
            background: #153325;
            box-shadow: 0 15px 35px rgba(31, 78, 57, 0.25);
        }

        /* Clean Calendar Dropdown Customizer */
        ::-webkit-calendar-picker-indicator {
            filter: sepia(0.4) hue-rotate(90deg) saturate(1.5);
            cursor: pointer;
        }
        
        /* INTEGRATED VIDEO CONSULTATION HUB CONTAINER */
        .video-box {
            margin-top: 24px;
            padding: 24px;
            border-radius: var(--radius-medium);
            background: var(--earth-light);
            border: 1px solid rgba(217, 119, 74, 0.15);
            text-align: center;
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.6s ease-out;
        }

        .video-box p {
            margin: 0 0 14px 0;
            font-weight: 600;
            color: var(--earth-warm);
            font-size: 15px;
        }

        .video-btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: var(--radius-pill);
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--earth-warm);
            transition: var(--transition-smooth);
            box-shadow: 0 6px 16px rgba(217, 119, 74, 0.2);
        }

        .video-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(217, 119, 74, 0.35);
            background: #c5653b;
        }
    </style>
</head>
<body>

    <div class="booking-container">
        <h2>Schedule Consultation<br><span>Dr. {{ doctor.user.last_name }}</span></h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Preferred Date</label>
                <input type="date" name="date" required min="{{ today }}">
            </div>

            <div class="form-group">
                <label>Preferred Time</label>
                <input type="time" name="time" required>
            </div>

            <div class="form-group">
                <label>Consultation Mode</label>
                <select name="mode">
                    <option value="clinic">Clinic Visit (In-Person)</option>
                    <option value="video">Secure Video Call</option>
                    <option value="home">Home Visit</option>
                </select>
            </div>

            <div class="form-group">
                <label>Reason for Visit / Symptoms</label>
                <textarea name="message" placeholder="Briefly describe your medical concern..."></textarea>
            </div>

            <button type="submit">Confirm Secure Booking</button>
        </form>

        <!-- Dynamic Live Meeting Link Injector Block -->
        {% if appointment.mode == "video" and appointment.meeting_link %}
        <div class="video-box">
            <p>🎥 Video Consultation Available</p>
            <a href="{{ appointment.meeting_link }}" target="_blank" class="video-btn">
                Join Video Consultation
            </a>
        </div>
        {% endif %}
    </div>

</body>
</html>
