<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed | CuraFlow</title>
    
    <!-- Google Fonts & Smooth Animation Engine Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            /* Cozy & Soft Healthcare Color Variables */
            --bg-calm: #f4f7f5;
            --text-dark: #12241f;
            --text-muted: #4e635c;
            
            /* Main Hues */
            --sage-primary: #1f4e39;
            --sage-light: #3e926d;
            --sage-accent: #7ed9ae;
            
            /* Cozy Earth Accents */
            --earth-warm: #d9774a;
            --earth-light: #fdf3ee;
            --cream-soft: #ffffff;
            --sand-warm: #faf9f6;
            
            /* Modern Structural Properties */
            --radius-large: 28px;
            --radius-medium: 18px;
            --radius-pill: 60px;
            --card-shadow: 0 20px 40px rgba(31, 78, 57, 0.04);
            --hover-shadow: 0 35px 65px rgba(31, 78, 57, 0.09);
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #eaf2ee 0%, var(--bg-calm) 50%);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* SUCCESS PORTAL CARD WITH DIAGONAL SLICE REVEAL */
        .success-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-large);
            padding: 50px 40px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: relative;
            box-sizing: border-box;
            
            /* High-end Asymmetric Diagonal Slice Entrance Animation */
            animation: diagonalSliceReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: clip-path;
        }

        @keyframes diagonalSliceReveal {
            0% { clip-path: polygon(0 0, 0 0, 0 100%, 0% 100%); opacity: 0.3; }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); opacity: 1; }
        }

        /* Ambient glowing backdrop pulse */
        .glow-node {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(62, 146, 109, 0.08) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* Success Verification Icon Ring */
        .icon-box {
            width: 90px;
            height: 90px;
            background: var(--earth-light);
            border: 2px solid var(--earth-warm);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 28px;
            box-shadow: 0 10px 20px rgba(217, 119, 74, 0.1);
            animation: bounceScaleIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) delay 0.2s;
        }

        .checkmark {
            font-size: 42px;
            color: var(--earth-warm);
            font-weight: bold;
        }

        h2 {
            font-size: 30px;
            margin: 0 0 12px 0;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--sage-primary), var(--earth-warm));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 36px 0;
            font-weight: 500;
        }

        p strong {
            color: var(--sage-primary);
            font-weight: 700;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .btn {
            padding: 16px;
            border-radius: var(--radius-medium);
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            box-sizing: border-box;
            transition: var(--transition-smooth);
            text-align: center;
        }

        .btn-primary {
            background: var(--sage-primary);
            color: white;
            box-shadow: 0 10px 25px rgba(31, 78, 57, 0.15);
        }

        .btn-primary:hover {
            background: #153325;
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(31, 78, 57, 0.25);
        }

        .btn-outline {
            border: 2px solid var(--sage-light);
            color: var(--sage-primary);
            background: transparent;
        }

        .btn-outline:hover {
            background: rgba(62, 146, 109, 0.08);
            transform: translateY(-2px);
        }

        @keyframes bounceScaleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glow-node"></div>

    <div class="success-card">
        <div class="icon-box">
            <span class="checkmark">✓</span>
        </div>
        
        <h2>Request Sent</h2>
        <p>Your appointment request with <strong>Dr. {{ doctor.user.last_name }}</strong> has been submitted. The doctor will review your details shortly.</p>
        
        <!-- Background Pipeline Token Operations Block Holder -->
        <div style="display:none;" data-backend-pipeline="secure-validation">
            <!-- State parameters verified clean -->
        </div>

        <div class="btn-group">
            <a href="{% url 'patient_dashboard' %}" class="btn btn-primary">Track My Appointment</a>
            <a href="/" class="btn btn-outline">Back to Home</a>
        </div>
    </div>

</body>
</html>
