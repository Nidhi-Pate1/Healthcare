<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Passport | CuraFlow</title>
    
    <!-- Google Fonts & Smooth Animation Engine Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            /* Cozy & Soft Healthcare Colors */
            --bg-calm: #f4f7f5;
            --text-dark: #12241f;
            --text-muted: #4e635c;
            
            /* Main Hues */
            --sage-primary: #1f4e39;
            --sage-light: #3e926d;
            --sage-accent: #7ed9ae;
            
            /* Cozy Earth Accents */
            --earth-warm: #d9774a;
            --earth-light: #fdf3ee;
            --cream-soft: #ffffff;
            --sand-warm: #faf9f6;
            
            /* Modern Structural Properties */
            --radius-large: 28px;
            --radius-medium: 18px;
            --radius-pill: 60px;
            --card-shadow: 0 20px 40px rgba(31, 78, 57, 0.03);
            --hover-shadow: 0 35px 65px rgba(31, 78, 57, 0.08);
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #eaf2ee 0%, var(--bg-calm) 50%);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            animation: fadeIn 0.8s ease-out;
        }

        .header-section {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h2 {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1.5px;
            margin: 0 0 6px 0;
        }

        .subtitle {
            color: var(--earth-warm);
            background: var(--earth-light);
            padding: 6px 16px;
            border-radius: var(--radius-pill);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
        }

        /* GRID LAYOUT */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
        }

        @media (max-width: 800px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        /* PREMIUM GLASS CARDS */
        .passport-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-large);
            padding: 35px;
            box-shadow: var(--card-shadow);
            transition: var(--transition-smooth);
            box-sizing: border-box;
        }

        .passport-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--hover-shadow);
            border-color: rgba(62, 146, 109, 0.15);
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dark);
            font-weight: 800;
            margin-bottom: 20px;
        }

        label::before {
            content: '';
            width: 4px;
            height: 14px;
            background: var(--sage-light);
            border-radius: var(--radius-pill);
        }

        textarea, input[type="text"] {
            width: 100%;
            background: var(--sand-warm);
            border: 1px solid rgba(31, 78, 57, 0.08);
            border-radius: var(--radius-medium);
            padding: 16px;
            color: var(--text-dark);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
            outline: none;
            box-sizing: border-box;
            transition: var(--transition-smooth);
        }

        textarea:focus, input:focus {
            background: var(--cream-soft);
            border-color: var(--sage-light);
            box-shadow: 0 0 0 4px rgba(62, 146, 109, 0.1);
        }

        textarea {
            height: 160px;
            resize: none;
            line-height: 1.6;
        }

        /* CUSTOM FILE SELECTION BLOCK */
        input[type="file"] {
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            display: block;
            width: 100%;
        }

        /* ACTIONS BUTTON ARCS */
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-medium);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-sizing: border-box;
        }

        .btn-save { 
            background: var(--sage-primary); 
            color: white; 
            box-shadow: 0 6px 16px rgba(31, 78, 57, 0.12);
        }
        
        .btn-save:hover { 
            background: #153325;
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(31, 78, 57, 0.22);
        }

        .btn-upload { 
            background: var(--earth-warm); 
            color: white; 
            box-shadow: 0 6px 16px rgba(217, 119, 74, 0.12);
        }
        
        .btn-upload:hover { 
            background: #be653a;
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(217, 119, 74, 0.22);
        }

        /* HEALTH RECORDS GRID ARRAY */
        .report-list {
            margin-top: 40px;
            grid-column: 1 / -1;
        }

        .report-item {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(31, 78, 57, 0.05);
            padding: 20px 30px;
            border-radius: var(--radius-medium);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            box-shadow: var(--card-shadow);
            transition: var(--transition-smooth);
        }

        .report-item:hover {
            background: var(--cream-soft);
            border-color: rgba(62, 146, 109, 0.2);
            transform: translateY(-2px);
            box-shadow: var(--hover-shadow);
        }

        .report-info h4 { 
            margin: 0 0 4px 0; 
            font-size: 16px; 
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .report-info span { 
            font-size: 12px; 
            color: var(--text-muted); 
            font-weight: 500;
        }

        /* LINK ALIGNMENT ARCHITECTURE */
        .view-link {
            text-decoration: none;
            color: var(--earth-warm);
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid var(--earth-warm);
            padding: 10px 18px;
            border-radius: var(--radius-medium);
            transition: var(--transition-smooth);
        }

        .view-link:hover {
            background: var(--earth-warm);
            color: white;
            box-shadow: 0 6px 16px rgba(217, 119, 74, 0.15);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section animate__animated animate__fadeInDown">
        <h2>Medical Passport</h2>
        <p class="subtitle">Secure Health Identity</p>
    </div>

    <div class="grid-layout">
        <!-- LEFT PANEL: MEDICAL HISTORY LOGS -->
        <div class="passport-card animate__animated animate__fadeInLeft">
            <label>Patient History &amp; Symptoms</label>
            <form method="POST">
                {% csrf_token %}
                <textarea name="history" placeholder="Describe long-term medical conditions, tracking allergies, or current systemic symptoms...">{{ profile.medical_history }}</textarea>
                <button type="submit" name="update_history" class="btn-save">Update History</button>
            </form>
        </div>

        <!-- RIGHT PANEL: DISPATCH FILE METRIC CHANNELS -->
        <div class="passport-card animate__animated animate__fadeInRight">
            <label>Upload Clinical Reports</label>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <input type="text" name="report_title" placeholder="Report Title (e.g., MRI Scan, Blood Work)" required>
                <input type="file" name="report_file" required>
                <button type="submit" name="upload_report" class="btn-upload">Secure Upload</button>
            </form>
        </div>

        <!-- LOWER SECTION: DIGITAL RECORD INVENTORY STACK -->
        <div class="report-list animate__animated animate__fadeInUp">
            <label>Digital Health Records Inventory</label>
            {% for report in reports %}
            <div class="report-item">
                <div class="report-info">
                    <h4>{{ report.title }}</h4>
                    <span>Uploaded on: {{ report.uploaded_at|date:"d M Y" }}</span>
                </div>
                <a href="{{ report.file.url }}" class="view-link" target="_blank">View Document 📄</a>
            </div>
            {% empty %}
            <div style="text-align: center; color: var(--text-muted); padding: 50px 20px; background: rgba(255, 255, 255, 0.5); border-radius: var(--radius-large); border: 2px dashed rgba(31, 78, 57, 0.1); font-weight: 500;">
                No electronic healthcare report modules uploaded to your ledger profile yet.
            </div>
            {% endfor %}
        </div>
    </div>
</div>

</body>
</html>
