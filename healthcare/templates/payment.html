<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | CuraFlow</title>
    
    <!-- Google Fonts & Smooth Animation Engine Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            /* Cozy & Soft Healthcare Colors */
            --bg-calm: #f4f7f5;
            --text-dark: #12241f;
            --text-muted: #4e635c;
            
            /* Main Hues */
            --sage-primary: #1f4e39;
            --sage-light: #3e926d;
            --sage-accent: #7ed9ae;
            
            /* Cozy Earth Accents */
            --earth-warm: #d9774a;
            --earth-light: #fdf3ee;
            --cream-soft: #ffffff;
            --sand-warm: #faf9f6;
            
            /* Modern Structural Properties */
            --radius-large: 28px;
            --radius-medium: 18px;
            --radius-pill: 60px;
            --card-shadow: 0 20px 40px rgba(31, 78, 57, 0.03);
            --hover-shadow: 0 35px 65px rgba(31, 78, 57, 0.08);
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top right, #eaf2ee 0%, var(--bg-calm) 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-dark);
        }

        /* PREMIUM GLASS PORTAL CONTAINER WITH DIAGONAL SLICE REVEAL */
        .payment-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            border-radius: var(--radius-large);
            text-align: center;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            
            /* High-end Asymmetric Diagonal Slice Entrance Animation */
            animation: diagonalSliceReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: clip-path;
        }

        @keyframes diagonalSliceReveal {
            0% { clip-path: polygon(0 0, 0 0, 0 100%, 0% 100%); opacity: 0.3; }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); opacity: 1; }
        }

        /* Top Border Decorative Accent Line */
        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(to right, var(--sage-light), var(--earth-warm));
        }

        .shield-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        h2 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            color: var(--text-dark);
        }

        .status-text {
            color: var(--earth-warm);
            background: var(--earth-light);
            padding: 4px 14px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
        }

        /* COZY AMOUNT AREA DISPLAY */
        .amount-display {
            background: var(--sand-warm);
            padding: 24px;
            border-radius: var(--radius-large);
            border: 1px solid rgba(31, 78, 57, 0.06);
            margin-bottom: 30px;
        }

        .total-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: block;
            font-weight: 700;
        }

        .total-value {
            font-size: 38px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1px;
        }

        /* BUTTON ARCS */
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            background: var(--sage-primary);
            color: white;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            border-radius: var(--radius-medium);
            cursor: pointer;
            text-transform: uppercase;
            transition: var(--transition-smooth);
            box-shadow: 0 10px 25px rgba(31, 78, 57, 0.15);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #153325;
            box-shadow: 0 15px 35px rgba(31, 78, 57, 0.25);
        }

        .secure-footer {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .secure-footer svg { 
            fill: var(--text-muted); 
        }
        
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .back-link:hover {
            color: var(--sage-primary);
        }
    </style>
</head>

<body>

<div class="payment-card">
    <span class="shield-icon">🛡️</span>
    <h2>Secure Gateway</h2>
    <p class="status-text">Authorization Pending</p>

    <div class="amount-display">
        <span class="total-label">Payable Amount</span>
        <span class="total-value">₹{{ total }}</span>
    </div>

    <button id="pay-btn" class="btn">Initialize Payment</button>

    <div class="secure-footer">
        <svg height="14" width="14" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
        SSL Encrypted | Powered by Razorpay
    </div>
    
    <a href="/cart/" class="back-link">← Return to Cart</a>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
document.getElementById("pay-btn").onclick = function(e){
    var amount = parseInt("{{ total|default:'0' }}");

    if (isNaN(amount) || amount <= 0) {
        alert("Invalid amount!");
        return;
    }

    var options = {
        "key": "rzp_test_T6EnUtBXSMn61h", 
        "amount": amount * 100, 
        "currency": "INR",
        "name": "CuraFlow Health Services",
        "description": "Medical Services Payment Portfolio",
        "handler": function (response){
            window.location.href = "/payment-success/";
        },
        "prefill": {
            "name": "{{ request.user.username|default:'User' }}",
        },
        "theme": {
            "color": "#1f4e39" /* Matched cleanly to var(--sage-primary) */
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
    e.preventDefault();
}
</script>

</body>
</html>
